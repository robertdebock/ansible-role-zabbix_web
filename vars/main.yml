---
# vars file for zabbix_web

_zabbix_web_packages:
  Debian:
    - zabbix-frontend-php
    - zabbix-apache-conf
  RedHat:
    - zabbix-web-mysql
    - zabbix-apache-conf
  Suse:
    - zabbix-web-mysql
    - zabbix-apache-conf

zabbix_web_packages: "{{ _zabbix_web_packages[ansible_facts['os_family'] ~ '-' ~ ansible_facts['distribution_major_version']] | default(_zabbix_web_packages[ansible_facts['os_family']] ) }}"

_zabbix_configuration_path:
  default: /etc/zabbix/web
  Ubuntu-16: /usr/share/zabbix/conf

zabbix_configuration_path: "{{ _zabbix_configuration_path[ansible_facts['distribution'] ~ '-' ~ ansible_facts['distribution_major_version']] | default(_zabbix_configuration_path['default'] ) }}"

_zabbix_web_httpd_service:
  default: apache2
  RedHat: httpd

zabbix_web_httpd_service: "{{ _zabbix_web_httpd_service[ansible_facts['os_family']] | default(_zabbix_web_httpd_service['default']) }}"

_zabbix_web_mysql_socket:
  default: /var/run/mysql/mysql.sock
  Debian: /run/mysql/mysqld.sock
  RedHat: /var/lib/mysql/mysql.sock

zabbix_web_mysql_socket: "{{ _zabbix_web_mysql_socket[ansible_facts['os_family']] | default(_zabbix_web_mysql_socket['default']) }}"
